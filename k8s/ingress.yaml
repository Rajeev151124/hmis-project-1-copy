apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hmis-ingress
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

      - path: /patients
        pathType: Prefix
        backend:
          service:
            name: patient-service
            port:
              number: 3000

      - path: /visits
        pathType: Prefix
        backend:
          service:
            name: visit-service
            port:
              number: 3001
